<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Broker Pre-Qualification Assessment</title>
<style>
  :root{
    --paper:#eef1ef;
    --paper-raised:#ffffff;
    --ink:#171a1c;
    --ink-soft:#4b5350;
    --line:#d5d9d6;
    --accent:#26456b;
    --accent-soft:#e4eaf1;
    --gate:#a23b32;
    --gate-soft:#f3e4e1;
    --integrity:#a97a22;
    --integrity-soft:#f2e9d6;
    --good:#3f7a52;
    --good-soft:#e2ede4;
    --amber:#c08a2e;
    --amber-soft:#f4ead2;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#14171a;
      --paper-raised:#1b1f22;
      --ink:#e9ebe8;
      --ink-soft:#a8b0ac;
      --line:#2c3134;
      --accent:#7fa8d1;
      --accent-soft:#20303f;
      --gate:#d97567;
      --gate-soft:#3a2523;
      --integrity:#d9a94d;
      --integrity-soft:#3a2f1a;
      --good:#6fbe8c;
      --good-soft:#1f3327;
      --amber:#d9a94d;
      --amber-soft:#332a15;
    }
  }
  *{ box-sizing:border-box; }
  html{ -webkit-tap-highlight-color:transparent; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.55;
    margin:0;
    padding:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  .mono{ font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-variant-numeric:tabular-nums; }
  a, button{ font-family:inherit; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:3px; }

  /* ---------- progress header ---------- */
  .progress-header{
    position:sticky; top:0; z-index:10; background:var(--paper);
    border-bottom:1px solid var(--line);
    padding:14px 20px 12px;
  }
  .progress-header.hidden{ display:none; }
  .progress-meta{
    display:flex; justify-content:space-between; align-items:baseline;
    max-width:640px; margin:0 auto 8px; font-size:12px; color:var(--ink-soft);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  .progress-track{
    max-width:640px; margin:0 auto; height:5px; border-radius:3px; background:var(--line); overflow:hidden;
  }
  .progress-fill{
    height:100%; background:var(--accent); border-radius:3px; width:0%;
    transition:width .35s ease;
  }
  @media (prefers-reduced-motion: reduce){ .progress-fill{ transition:none; } }

  /* ---------- stage ---------- */
  main{ flex:1; display:flex; flex-direction:column; }
  .stage{
    flex:1; display:flex; align-items:center; justify-content:center; padding:32px 20px 24px;
  }
  .panel{ width:100%; max-width:640px; }

  /* ---------- intro ---------- */
  .intro{ text-align:left; }
  .eyebrow{
    font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  h1{
    font-family:ui-serif,"Iowan Old Style","Palatino Linotype",Georgia,serif;
    font-weight:600; font-size:clamp(26px,5vw,36px); margin:10px 0 12px; text-wrap:balance;
  }
  .dek{ color:var(--ink-soft); font-size:16px; max-width:56ch; margin:0 0 28px; }
  .intro-facts{
    display:flex; flex-wrap:wrap; gap:10px; margin-bottom:32px;
  }
  .fact{
    font-size:12.5px; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    color:var(--ink-soft); background:var(--paper-raised); border:1px solid var(--line);
    padding:6px 12px; border-radius:20px;
  }

  /* ---------- question card ---------- */
  .qcard{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:8px;
    padding:28px 26px; border-left-width:5px; border-left-style:solid;
    opacity:0; transform:translateY(8px); animation:enter .32s ease forwards;
  }
  @keyframes enter{ to{ opacity:1; transform:translateY(0); } }
  @media (prefers-reduced-motion: reduce){ .qcard{ animation:none; opacity:1; transform:none; } }
  .qcard.gate{ border-left-color:var(--gate); }
  .qcard.scored{ border-left-color:var(--accent); }
  .qcard.integrity{ border-left-color:var(--integrity); }

  .qkicker{
    display:flex; align-items:center; gap:10px; margin-bottom:14px;
  }
  .qtag{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:10.5px; text-transform:uppercase;
    letter-spacing:.06em; padding:3px 8px; border-radius:3px; white-space:nowrap;
  }
  .gate .qtag{ background:var(--gate-soft); color:var(--gate); }
  .scored .qtag{ background:var(--accent-soft); color:var(--accent); }
  .integrity .qtag{ background:var(--integrity-soft); color:var(--integrity); }
  .qsection{ font-size:11.5px; color:var(--ink-soft); font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }

  legend.qtext{
    display:block; font-size:19px; font-weight:600; line-height:1.4; margin:0 0 20px; padding:0;
  }

  .opts{ margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:8px; }
  .opt-label{
    display:flex; align-items:flex-start; gap:12px; padding:13px 14px; cursor:pointer;
    border-radius:6px; border:1.5px solid var(--line); background:transparent;
    transition:border-color .15s ease, background .15s ease;
  }
  .opt-label:hover{ border-color:var(--accent); }
  .opt-label.selected{ border-color:var(--accent); background:var(--accent-soft); }
  .opt-label input{ accent-color:var(--accent); width:19px; height:19px; flex:none; margin-top:1px; }
  .opt-label span{ flex:1; font-size:14.5px; padding-top:1px; }

  .helptext{ font-size:12.5px; color:var(--ink-soft); margin:14px 0 0; }

  /* ---------- footer nav ---------- */
  .navbar{
    border-top:1px solid var(--line); padding:16px 20px; display:flex; justify-content:center;
  }
  .navbar.hidden{ display:none; }
  .navrow{ width:100%; max-width:640px; display:flex; gap:12px; align-items:center; }
  button{
    font-size:15px; font-weight:600; padding:13px 22px; border-radius:6px; border:none;
    cursor:pointer;
  }
  .btn-primary{ background:var(--accent); color:var(--paper-raised); flex:1; }
  .btn-primary:disabled{ opacity:.4; cursor:not-allowed; }
  .btn-primary:not(:disabled):hover{ opacity:.92; }
  .btn-ghost{
    background:transparent; color:var(--ink-soft); border:1.5px solid var(--line);
  }
  .btn-ghost:hover{ border-color:var(--ink-soft); color:var(--ink); }
  .btn-full{ width:100%; }

  /* ---------- result ---------- */
  .resultcard{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:8px;
    padding:36px 30px; text-align:center;
    opacity:0; transform:translateY(8px); animation:enter .32s ease forwards;
  }
  @media (prefers-reduced-motion: reduce){ .resultcard{ animation:none; opacity:1; transform:none; } }
  .badge{
    display:inline-block; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:13px; text-transform:uppercase; letter-spacing:.06em; padding:6px 16px; border-radius:20px;
    margin-bottom:16px;
  }
  .badge.reject{ background:var(--gate-soft); color:var(--gate); }
  .badge.hold{ background:var(--amber-soft); color:var(--amber); }
  .badge.pass{ background:var(--good-soft); color:var(--good); }
  .score{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:56px; font-weight:600; margin:4px 0 14px; font-variant-numeric:tabular-nums;
  }
  .score small{ font-size:22px; color:var(--ink-soft); font-weight:400; }
  .resultmsg{ font-size:15px; color:var(--ink-soft); max-width:48ch; margin:0 auto; }
  .breakdown{ text-align:left; margin-top:28px; border-top:1px solid var(--line); padding-top:20px; }
  .breakdown-title{
    font-size:11.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; margin:0 0 12px;
  }
  .breakdown table{ width:100%; border-collapse:collapse; font-size:14px; }
  .breakdown td{ padding:8px 2px; border-bottom:1px solid var(--line); }
  .breakdown td:last-child{ text-align:right; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; color:var(--ink-soft); }
  .breakdown tr.total td{ border-bottom:none; padding-top:12px; font-weight:600; color:var(--ink); }

  @media (max-width:480px){
    .qcard{ padding:22px 18px; }
    legend.qtext{ font-size:17px; }
    .resultcard{ padding:28px 20px; }
    .score{ font-size:44px; }
  }
</style>
</head>
<body>

  <div id="progressHeader" class="progress-header hidden">
    <div class="progress-meta">
      <span id="progressLabel">Section A · Requirements</span>
      <span id="progressCount" class="mono">1 / 13</span>
    </div>
    <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
  </div>

  <main>
    <div class="stage">
      <div id="stageContent" class="panel"></div>
    </div>
    <div id="navbar" class="navbar hidden">
      <div class="navrow">
        <button id="backBtn" class="btn-ghost" type="button">Back</button>
        <button id="nextBtn" class="btn-primary" type="button" disabled>Next</button>
      </div>
    </div>
  </main>

<script>
(function(){

  // ---- Question bank -------------------------------------------------
  var QUESTIONS = [
    { id:"A1", section:"A", sectionLabel:"Section A · Requirements", kind:"gate", tag:"Yes / No", shortLabel:"Commission-only comfort",
      text:"Are you comfortable working in a commission-only structure with no base salary, where your income is 100% tied to accounts you activate and manage?",
      options:[ {label:"Yes", disqualify:false}, {label:"No", disqualify:true} ] },
    { id:"A2", section:"A", sectionLabel:"Section A · Requirements", kind:"gate", tag:"Multiple choice", shortLabel:"Weekly availability",
      text:"How many hours per week can you commit to this role for the first 30 days?",
      options:[
        {label:"Under 10 hours", disqualify:true},
        {label:"10–14 hours", disqualify:true},
        {label:"15–19 hours", disqualify:false},
        {label:"20+ hours", disqualify:false}
      ] },
    { id:"A3", section:"A", sectionLabel:"Section A · Requirements", kind:"gate", tag:"Yes / No", shortLabel:"1099 acknowledgment",
      text:"This is a 1099 independent contractor role with no employee benefits. You are responsible for your own tax withholding, including quarterly estimated payments. Do you understand and accept this?",
      options:[ {label:"Yes", disqualify:false}, {label:"No", disqualify:true} ] },
    { id:"A4", section:"A", sectionLabel:"Section A · Requirements", kind:"gate", tag:"Yes / No", shortLabel:"Non-compete check",
      text:"Are you currently bound by a non-compete, exclusivity, or non-solicitation agreement with another performance marketing network, brokerage, or agency?",
      options:[ {label:"No", disqualify:false}, {label:"Yes", disqualify:true} ] },
    { id:"A5", section:"A", sectionLabel:"Section A · Requirements", kind:"gate", tag:"Yes / No", shortLabel:"Fraud / compliance history",
      text:"Has any network, affiliate platform, or brokerage ever suspended or terminated an account of yours for fraud, lead quality, or compliance violations?",
      options:[ {label:"No", disqualify:false}, {label:"Yes", disqualify:true} ] },
    { id:"A6", section:"A", sectionLabel:"Section A · Requirements", kind:"gate", tag:"Multiple choice", shortLabel:"Weekly reporting commitment",
      text:"Are you willing to submit a weekly performance report every Monday by 10 AM without exception, including weeks where results are low?",
      options:[
        {label:"Yes, no problem", disqualify:false},
        {label:"Yes, but may need reminders", disqualify:true},
        {label:"No / depends", disqualify:true}
      ] },
    { id:"A7", section:"A", sectionLabel:"Section A · Requirements", kind:"gate", tag:"Yes / No", shortLabel:"Response-time SLA",
      text:"Can you guarantee a response to advertiser or publisher contacts within 4 business hours, Monday–Friday, during your stated availability window?",
      options:[ {label:"Yes", disqualify:false}, {label:"No", disqualify:true} ] },

    { id:"B1", section:"B", sectionLabel:"Section B · Experience & Fit", kind:"scored", tag:"Multiple choice · 0–20 pts", shortLabel:"CRM / tracking discipline",
      text:"Have you previously worked within a CRM or tracking system where daily activity logging was required? (e.g. Salesforce, HubSpot, GoHighLevel, Pipedrive)",
      options:[
        {label:"Yes, used daily", points:20},
        {label:"Yes, occasionally", points:11},
        {label:"No, but willing to learn", points:5},
        {label:"No", points:0}
      ] },
    { id:"B2", section:"B", sectionLabel:"Section B · Experience & Fit", kind:"scored", tag:"Multiple choice · 0–20 pts", shortLabel:"Prior commission earnings",
      text:"In your most recent role or business, what was your average monthly commission or performance-based earnings?",
      options:[
        {label:"$5,000+ / mo", points:20},
        {label:"$2,000–$4,999 / mo", points:13},
        {label:"$500–$1,999 / mo", points:7},
        {label:"Under $500 / N/A", points:0}
      ] },
    { id:"B3", section:"B", sectionLabel:"Section B · Experience & Fit", kind:"multiscore", tag:"Select all that apply · 0–15 pts", shortLabel:"Tracking-platform fluency", cap:15,
      text:"Which of the following tracking platforms have you personally configured postbacks or pixels in?",
      options:[
        {label:"Everflow", points:3},
        {label:"HasOffers (Tune)", points:3},
        {label:"Cake", points:3},
        {label:"Linktrust", points:3},
        {label:"Offer18", points:3},
        {label:"Hitpath", points:3},
        {label:"None of the above", points:0, exclusive:true}
      ] },
    { id:"B4", section:"B", sectionLabel:"Section B · Experience & Fit", kind:"scored", tag:"Situational judgment · 0–25 pts", shortLabel:"Day-one process",
      text:"You're assigned three new advertiser accounts that must be live and producing within 7 days. What do you do on day one?",
      options:[
        {label:"Contact all three advertiser/publisher accounts same day to confirm contacts and tracking requirements, then log a 7-day activation checklist", points:25},
        {label:"Start with whichever account looks easiest to activate first, plan the other two once it's live", points:13},
        {label:"Read the full SOP end to end before contacting anyone, even if it pushes outreach past day one", points:8},
        {label:"Wait for the account contacts to reach out first so I understand what they need", points:0}
      ] },
    { id:"B5", section:"B", sectionLabel:"Section B · Experience & Fit", kind:"multiscore", tag:"Select all that apply · 0–10 pts", shortLabel:"Vertical experience", cap:10,
      text:"What performance marketing verticals have you worked in?",
      options:[
        {label:"Insurance / FE / Medicare", points:5},
        {label:"Solar / Home Services", points:5},
        {label:"Legal / Mass Tort", points:5},
        {label:"Debt / Financial", points:5},
        {label:"None", points:0, exclusive:true}
      ] },

    { id:"C1", section:"C", sectionLabel:"Section C · Integrity Check", kind:"integrity", tag:"Instructed response", shortLabel:"Attention check",
      text:'To confirm you’re reading each question fully rather than clicking through, select “Legal / Mass Tort” as your answer to this item.',
      options:[
        {label:"Insurance / FE / Medicare", correct:false},
        {label:"Solar / Home Services", correct:false},
        {label:"Legal / Mass Tort", correct:true},
        {label:"Debt / Financial", correct:false}
      ] }
  ];

  var TOTAL = QUESTIONS.length;

  // ---- State ----------------------------------------------------------
  var state = { screen:"intro", qIndex:0, answers:{} };

  var progressHeader = document.getElementById("progressHeader");
  var progressLabel = document.getElementById("progressLabel");
  var progressCount = document.getElementById("progressCount");
  var progressFill = document.getElementById("progressFill");
  var stageContent = document.getElementById("stageContent");
  var navbar = document.getElementById("navbar");
  var backBtn = document.getElementById("backBtn");
  var nextBtn = document.getElementById("nextBtn");

  function el(tag, attrs, html){
    var e = document.createElement(tag);
    if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  // ---- Intro screen -----------------------------------------------------
  function renderIntro(){
    progressHeader.classList.add("hidden");
    navbar.classList.add("hidden");
    stageContent.innerHTML = "";

    var wrap = el("div", {class:"intro"});
    wrap.appendChild(el("div", {class:"eyebrow"}, "EDM Lead Network — Broker Intake"));
    wrap.appendChild(el("h1", null, "Broker Pre-Qualification Assessment"));
    wrap.appendChild(el("p", {class:"dek"},
      "13 questions, about 3 minutes. Every question is yes/no or multiple choice — nothing here requires a written answer, and you'll get your result immediately."));

    var facts = el("div", {class:"intro-facts"});
    ["7 requirements","90 points on fit","10-point integrity check"].forEach(function(f){
      facts.appendChild(el("span", {class:"fact"}, f));
    });
    wrap.appendChild(facts);

    var startBtn = el("button", {class:"btn-primary btn-full", type:"button"}, "Begin assessment");
    startBtn.addEventListener("click", function(){
      state.screen = "question";
      state.qIndex = 0;
      render();
    });
    wrap.appendChild(startBtn);

    stageContent.appendChild(wrap);
  }

  // ---- Question screen ----------------------------------------------
  function updateProgress(){
    var q = QUESTIONS[state.qIndex];
    progressHeader.classList.remove("hidden");
    progressLabel.textContent = q.sectionLabel;
    progressCount.textContent = (state.qIndex + 1) + " / " + TOTAL;
    progressFill.style.width = Math.round(((state.qIndex) / TOTAL) * 100) + "%";
  }

  function renderQuestion(){
    updateProgress();
    navbar.classList.remove("hidden");
    stageContent.innerHTML = "";

    var q = QUESTIONS[state.qIndex];
    var cardClass = q.kind === "gate" ? "gate" : (q.kind === "integrity" ? "integrity" : "scored");
    var inputType = q.kind === "multiscore" ? "checkbox" : "radio";

    var card = el("div", {class:"qcard " + cardClass});
    var kicker = el("div", {class:"qkicker"});
    kicker.appendChild(el("span", {class:"qtag"}, q.tag));
    card.appendChild(kicker);

    var fs = el("fieldset");
    fs.style.border = "none"; fs.style.margin = "0"; fs.style.padding = "0";
    var legend = el("legend", {class:"qtext"}, q.text);
    fs.appendChild(legend);

    var existing = state.answers[q.id];
    var list = el("ul", {class:"opts"});

    q.options.forEach(function(opt, i){
      var li = el("li");
      var label = el("label", {class:"opt-label"});
      var isChecked = false;
      if (inputType === "radio"){
        isChecked = existing === i;
      } else {
        isChecked = existing && existing.indexOf(i) !== -1;
      }
      if (isChecked) label.classList.add("selected");

      var input = el("input", { type: inputType, name: q.id, value: String(i) });
      if (isChecked) input.checked = true;
      label.appendChild(input);
      label.appendChild(el("span", null, opt.label));
      li.appendChild(label);
      list.appendChild(li);

      input.addEventListener("change", function(){
        if (inputType === "radio"){
          handleSingleSelect(q, i);
        } else {
          handleMultiToggle(q, i, list);
        }
      });
    });

    fs.appendChild(list);
    card.appendChild(fs);

    if (q.cap){
      card.appendChild(el("p", {class:"helptext"}, "Capped at " + q.cap + " points regardless of how many you select."));
    }

    stageContent.appendChild(card);

    backBtn.style.visibility = state.qIndex === 0 ? "hidden" : "visible";

    if (inputType === "checkbox"){
      nextBtn.textContent = state.qIndex === TOTAL - 1 ? "See result" : "Next";
      nextBtn.disabled = !(existing && existing.length > 0);
      nextBtn.onclick = function(){ advance(); };
    } else {
      // single-select auto-advances; hide the manual Next button's usefulness but keep it as a fallback
      nextBtn.textContent = state.qIndex === TOTAL - 1 ? "See result" : "Next";
      nextBtn.disabled = existing === undefined;
      nextBtn.onclick = function(){ advanceAfterSingle(q); };
    }
  }

  function handleSingleSelect(q, idx){
    state.answers[q.id] = idx;
    // refresh selected styling without a full re-render (keeps focus in place)
    var labels = stageContent.querySelectorAll(".opt-label");
    labels.forEach(function(l, i){ l.classList.toggle("selected", i === idx); });
    nextBtn.disabled = false;
    // Gate and integrity answers are recorded and scored like everything else —
    // a failed requirement no longer cuts the assessment short. See finish().
    setTimeout(function(){ advanceAfterSingle(q); }, 320);
  }

  function advanceAfterSingle(q){
    if (state.screen !== "question" || QUESTIONS[state.qIndex].id !== q.id) return; // already moved on
    advance();
  }

  function handleMultiToggle(q, idx, listEl){
    var current = state.answers[q.id] || [];
    var opt = q.options[idx];
    var box = listEl.querySelectorAll('input[type="checkbox"]')[idx];

    if (opt.exclusive && box.checked){
      current = [idx];
    } else if (box.checked){
      current = current.filter(function(i){ return !q.options[i].exclusive; });
      current.push(idx);
    } else {
      current = current.filter(function(i){ return i !== idx; });
    }
    state.answers[q.id] = current;

    var boxes = listEl.querySelectorAll('input[type="checkbox"]');
    boxes.forEach(function(b, i){
      b.checked = current.indexOf(i) !== -1;
      b.closest("label").classList.toggle("selected", b.checked);
    });

    nextBtn.disabled = current.length === 0;
  }

  function advance(){
    if (state.qIndex >= TOTAL - 1){
      finish();
      return;
    }
    state.qIndex += 1;
    renderQuestion();
  }

  backBtn.addEventListener("click", function(){
    if (state.qIndex === 0) return;
    state.qIndex -= 1;
    renderQuestion();
  });

  // ---- Scoring & result -----------------------------------------------
  function finish(){
    var breakdown = [];
    var requirements = [];
    var total = 0;

    QUESTIONS.forEach(function(q){
      if (q.kind === "gate"){
        var gIdx = state.answers[q.id];
        requirements.push({
          label:q.shortLabel,
          answer:q.options[gIdx].label,
          failed: !!q.options[gIdx].disqualify
        });
      } else if (q.kind === "scored"){
        var idx = state.answers[q.id];
        var pts = q.options[idx].points;
        total += pts;
        var max = Math.max.apply(null, q.options.map(function(o){ return o.points; }));
        breakdown.push({ label:q.shortLabel, pts:pts, max:max });
      } else if (q.kind === "multiscore"){
        var sel = state.answers[q.id] || [];
        var raw = sel.reduce(function(sum, i){ return sum + q.options[i].points; }, 0);
        var pts2 = Math.min(raw, q.cap);
        total += pts2;
        breakdown.push({ label:q.shortLabel, pts:pts2, max:q.cap });
      } else if (q.kind === "integrity"){
        var iIdx = state.answers[q.id];
        var correct = q.options[iIdx].correct;
        var pts3 = correct ? 10 : 0;
        total += pts3;
        breakdown.push({ label:q.shortLabel, pts:pts3, max:10 });
        requirements.push({
          label:q.shortLabel,
          answer:q.options[iIdx].label,
          failed: !correct
        });
      }
    });

    var flaggedForFollowUp = requirements.some(function(r){ return r.failed; });

    submitApplication(buildPipelinePayload(flaggedForFollowUp, total, breakdown, requirements));
    showResult(flaggedForFollowUp, total, breakdown, requirements);
  }

  // Assembles what would get sent to the CRM/GHL on submit. Every answer is
  // recorded and scored regardless of outcome — a failed requirement sets a
  // tag for manual follow-up instead of blocking the applicant mid-assessment.
  function buildPipelinePayload(flaggedForFollowUp, total, breakdown, requirements){
    return {
      answers: state.answers,
      score: total,
      breakdown: breakdown,
      requirements: requirements,
      tag: flaggedForFollowUp ? "non_qualified_pipeline" : "requirements_met",
      needsManualContact: flaggedForFollowUp
    };
  }

  function submitApplication(payload){
    // Wire this up to your intake pipeline, e.g.:
    // fetch("https://YOUR-GHL-WEBHOOK-URL", {
    //   method: "POST",
    //   headers: { "Content-Type": "application/json" },
    //   body: JSON.stringify(payload)
    // });
    console.log("Application payload (wire this to your pipeline):", payload);
  }

  function showResult(flaggedForFollowUp, total, breakdown, requirements){
    state.screen = "result";
    progressHeader.classList.add("hidden");
    navbar.classList.add("hidden");
    stageContent.innerHTML = "";

    var card = el("div", {class:"resultcard"});
    var badge = el("div", {class:"badge"});
    var score = el("div", {class:"score mono"});
    var msg = el("p", {class:"resultmsg"});

    var classification;
    if (flaggedForFollowUp){
      classification = "hold";
      badge.className = "badge hold";
      badge.textContent = "Under review";
      score.innerHTML = total + "<small>/100</small>";
      msg.textContent = "Thanks for completing the assessment. A member of our team will review your responses and reach out directly with next steps.";
    } else if (total < 50){
      classification = "reject";
      badge.className = "badge reject";
      badge.textContent = "Not qualified";
      score.innerHTML = total + "<small>/100</small>";
      msg.textContent = "Your score is below the qualifying threshold. You're welcome to re-apply in 90 days.";
    } else if (total < 70){
      classification = "hold";
      badge.className = "badge hold";
      badge.textContent = "Borderline — under review";
      score.innerHTML = total + "<small>/100</small>";
      msg.textContent = "You've cleared every requirement but scored in the borderline range. You'll be routed to a short supplemental video round before a scheduling decision.";
    } else if (total < 85){
      classification = "pass";
      badge.className = "badge pass";
      badge.textContent = "Qualified";
      score.innerHTML = total + "<small>/100</small>";
      msg.textContent = "You've qualified for the next step. A calendar link for your video interview will be sent shortly.";
    } else {
      classification = "pass";
      badge.className = "badge pass";
      badge.textContent = "High priority";
      score.innerHTML = total + "<small>/100</small>";
      msg.textContent = "Strong score across the board. You'll be fast-tracked for a priority interview slot.";
    }

    card.appendChild(badge);
    card.appendChild(score);
    card.appendChild(msg);

    var failedRequirements = requirements.filter(function(r){ return r.failed; });
    if (failedRequirements.length){
      var rq = el("div", {class:"breakdown"});
      rq.appendChild(el("p", {class:"breakdown-title"}, "Requirements flagged (" + failedRequirements.length + " / " + requirements.length + ")"));
      var rqTable = el("table");
      failedRequirements.forEach(function(r){
        var tr = el("tr");
        tr.appendChild(el("td", null, r.label));
        tr.appendChild(el("td", null, r.answer));
        rqTable.appendChild(tr);
      });
      rq.appendChild(rqTable);
      card.appendChild(rq);
    }

    var bd = el("div", {class:"breakdown"});
    bd.appendChild(el("p", {class:"breakdown-title"}, "Score breakdown"));
    var table = el("table");
    breakdown.forEach(function(r){
      var tr = el("tr");
      tr.appendChild(el("td", null, r.label));
      tr.appendChild(el("td", null, r.pts + " / " + r.max));
      table.appendChild(tr);
    });
    var totalRow = el("tr", {class:"total"});
    totalRow.appendChild(el("td", null, "Total"));
    totalRow.appendChild(el("td", null, total + " / 100"));
    table.appendChild(totalRow);
    bd.appendChild(table);
    card.appendChild(bd);

    var restart = el("button", {class:"btn-ghost btn-full", type:"button", style:"margin-top:24px;"}, "Start over");
    restart.addEventListener("click", function(){
      state = { screen:"intro", qIndex:0, answers:{} };
      render();
    });
    card.appendChild(restart);

    stageContent.appendChild(card);
    window.scrollTo({ top:0, behavior:"smooth" });
  }

  function render(){
    if (state.screen === "intro") renderIntro();
    else if (state.screen === "question") renderQuestion();
  }

  render();

})();
</script>
</body>
</html>
